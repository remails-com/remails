scaleway-certmanager-webhook:
  certManager:
    namespace: cert-manager
  secret:
    accessKey:
    secretKey:

nginxLoadBalancer:
  upcloudLoadBalancerPlan: "production-small" # available are "essentials", "development", "production-small", "production-medium"

namespaces:
  - name: remails-production
  - name: remails-staging

docker:
  - url: ghcr.io
    username: pohlm01
    password: personal-access-token-with-packages-read-access

traefik:
  ingressClass:
    enabled: true
    name: "traefik"
    isDefaultClass: false
  namespaceOverride: ingress
  providers:
    kubernetesCRD:
      allowCrossNamespace: true
    kubernetesIngress:
      enabled: true
  deployment:
    replicas: 2
  service:
    enabled: false
  ports:
    web:
      proxyProtocol:
        trustedIPs: ["10.0.2.0/24"]
    websecure:
      proxyProtocol:
        trustedIPs: ["10.0.2.0/24"]
